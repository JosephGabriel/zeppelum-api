type Query {
  hello: String
}

type Mutation {
  hello: String
}

type User {
  id: ID!
  name: String!
  email: String
  password: String!
  token: String
  createdAt: String!
  updatedAt: String!
  status: userStatus!
}

type Event {
  id: ID!
  img: String!
  title: String!
  price: Float!
  dateStart: String!
  dateEnd: String!
  status: eventStatus!
  category: Category!
  eventType: eventType!
  schedule: [String!]!
}

type Category {
  id: ID!
  name: String!
  event: [Event!]!
}

enum userStatus {
  ATIVO
  INATIVO
}

enum eventType {
  ONLINE
  PRESENCIAL
}

enum eventStatus {
  EM_BREVE
  EM_ANDAMENTO
  CONCLUIDO
}
